"""
Baseline Experiment: 2h → 3h (1:1.5) - MEDIUM PRIORITY

探索性实验:
- 输入2小时预测3小时
- 输出长度大于输入长度
- 测试模型 extrapolation 能力

关键问题:
1. 当 out_len > in_len 时，信息瓶颈在哪里?
2. 是否需要 hierarchical decoding?
3. CSI 随预测距离如何衰减?
"""

dataset:
  dataset_name: "sevir"
  img_height: 384
  img_width: 384
  # 输入2小时=24帧, 输出3小时=36帧
  in_len: 24
  out_len: 36
  seq_len: 60
  plot_stride: 3
  interval_real_time: 5
  sample_mode: "sequent"
  stride: 24
  layout: "NTHWC"
  start_date: [2017, 6, 13]
  train_val_split_date: [2017, 8, 15]
  train_test_split_date: [2017, 9, 15]
  end_date: [2017, 10, 15]
  metrics_mode: "0"
  metrics_list: ['csi', 'pod', 'sucr', 'bias']
  threshold_list: [16, 74, 133, 160, 181, 219]

layout:
  in_len: 24
  out_len: 36
  layout: "NTHWC"

optim:
  total_batch_size: 4
  micro_batch_size: 1
  seed: 0
  method: "adamw"
  lr: 0.0003
  wd: 0.01
  gradient_clip_val: 1.0
  max_epochs: 50
  # WSD Scheduler
  lr_scheduler_mode: "wsd"
  wsd_warmup_epochs: 10
  wsd_stable_epochs: 25
  wsd_decay_epochs: 15
  wsd_min_lr_ratio: 0.01
  # early stopping
  early_stop: true
  early_stop_mode: "min"
  early_stop_patience: 15
  save_top_k: 1

logging:
  logging_prefix: "Baseline_2h_to_3h_MediumPriority_Exploration"
  monitor_lr: true
  monitor_device: false
  track_grad_norm: -1
  use_wandb: false

trainer:
  check_val_every_n_epoch: 1
  log_step_ratio: 0.001
  precision: "bf16-mixed"
  accumulate_grad_batches: 4

vis:
  train_example_data_idx_list: [0, ]
  val_example_data_idx_list: [80, ]
  test_example_data_idx_list: [0, 80, 160, 240, 320, 400]
  eval_example_only: false
  plot_stride: 3

model:
  input_shape: [24, 384, 384, 1]
  target_shape: [36, 384, 384, 1]
  base_units: 64
  scale_alpha: 1.0

  # 解码器更深处理更长输出
  enc_depth: [2, 2]
  dec_depth: [2, 2, 2]
  enc_use_inter_ffn: true
  dec_use_inter_ffn: true
  dec_hierarchical_pos_embed: true  # 启用分层位置编码

  downsample: 2
  downsample_type: "patch_merge"
  upsample_type: "upsample"

  # 更多全局向量
  num_global_vectors: 12
  use_dec_self_global: false
  dec_self_update_global: true
  use_dec_cross_global: false
  use_global_vector_ffn: false
  use_global_self_attn: true
  separate_global_qkv: true
  global_dim_ratio: 1

  self_pattern: "axial"
  cross_self_pattern: "axial"
  cross_pattern: "cross_1x1"
  dec_cross_last_n_frames: null

  attn_drop: 0.1
  proj_drop: 0.1
  ffn_drop: 0.1
  num_heads: 4

  ffn_activation: "gelu"
  gated_ffn: false
  norm_layer: "layer_norm"
  padding_type: "zeros"
  pos_embed_type: "t+h+w"
  use_relative_pos: true
  self_attn_use_final_proj: true
  dec_use_first_self_attn: false

  z_init_method: "zeros"
  checkpoint_level: 2

  initial_downsample_type: "stack_conv"
  initial_downsample_activation: "leaky"
  initial_downsample_stack_conv_num_layers: 3
  initial_downsample_stack_conv_dim_list: [4, 16, 64]
  initial_downsample_stack_conv_downscale_list: [3, 2, 2]
  initial_downsample_stack_conv_num_conv_list: [2, 2, 2]

  attn_linear_init_mode: "0"
  ffn_linear_init_mode: "0"
  conv_init_mode: "0"
  down_up_linear_init_mode: "0"
  norm_init_mode: "0"

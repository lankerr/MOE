"""
Baseline Experiment: 4h → 4h (1:1) - HIGH PRIORITY

测试可预测性上限:
- 输入4小时预测4小时
- 挑战长期外推的极限能力
- 参考: MetNet-3, GraphCast 的长时序设置

关键问题:
1. 4小时后雷达回波的 predictability 是否还存在?
2. 多步误差累积如何影响 CSI?
3. 是否需要物理约束 (湿度、风场)?
"""

dataset:
  dataset_name: "sevir"
  img_height: 384
  img_width: 384
  # 4小时 = 48帧
  in_len: 48
  out_len: 48
  seq_len: 96
  plot_stride: 4
  interval_real_time: 5
  sample_mode: "sequent"
  stride: 48
  layout: "NTHWC"
  start_date: [2017, 6, 13]
  train_val_split_date: [2017, 8, 15]
  train_test_split_date: [2017, 9, 15]
  end_date: [2017, 10, 15]
  metrics_mode: "0"
  metrics_list: ['csi', 'pod', 'sucr', 'bias']
  threshold_list: [16, 74, 133, 160, 181, 219]

layout:
  in_len: 48
  out_len: 48
  layout: "NTHWC"

optim:
  total_batch_size: 2  # 更长序列，减小batch
  micro_batch_size: 1
  seed: 0
  method: "adamw"
  lr: auto  # 自动使用 LRFinder 寻找最优LR
  wd: 0.01
  gradient_clip_val: 0.5  # 更严格的梯度裁剪
  max_epochs: 60  # 更长序列需要更多epoch
  # Adaptive LR Scheduler
  lr_scheduler_mode: "adaptive"
  lr_finder_enabled: true
  lr_finder_start_lr: 1e-7
  lr_finder_end_lr: 0.5  # 长序列使用更小的最大LR
  lr_reduce_factor: 0.5
  lr_reduce_patience: 7
  lr_reduce_threshold: 1e-4
  min_lr: 1e-6
  # AutoStop
  early_stop: true
  early_stop_mode: "min"
  early_stop_patience: 20
  early_stop_min_delta: 1e-4
  grad_norm_threshold: 1e-5
  save_top_k: 1

logging:
  logging_prefix: "Baseline_4h_to_4h_HighPriority_UpperBound"
  monitor_lr: true
  monitor_device: false
  track_grad_norm: -1
  use_wandb: false

trainer:
  check_val_every_n_epoch: 1
  log_step_ratio: 0.001
  precision: "bf16-mixed"
  accumulate_grad_batches: 4

vis:
  train_example_data_idx_list: [0, ]
  val_example_data_idx_list: [80, ]
  test_example_data_idx_list: [0, 80, 160, 240, 320, 400]
  eval_example_only: false
  plot_stride: 4

model:
  input_shape: [48, 384, 384, 1]
  target_shape: [48, 384, 384, 1]
  base_units: 64
  scale_alpha: 1.0

  # 更深的编码器处理更长序列
  enc_depth: [2, 2, 2]
  dec_depth: [2, 2, 2]
  enc_use_inter_ffn: true
  dec_use_inter_ffn: true
  dec_hierarchical_pos_embed: false

  downsample: 2
  downsample_type: "patch_merge"
  upsample_type: "upsample"

  # 更多全局向量捕获长期依赖
  num_global_vectors: 16
  use_dec_self_global: false
  dec_self_update_global: true
  use_dec_cross_global: false
  use_global_vector_ffn: false
  use_global_self_attn: true
  separate_global_qkv: true
  global_dim_ratio: 1

  self_pattern: "axial"
  cross_self_pattern: "axial"
  cross_pattern: "cross_1x1"
  dec_cross_last_n_frames: null

  attn_drop: 0.1
  proj_drop: 0.1
  ffn_drop: 0.1
  num_heads: 8  # 更多头处理长序列

  ffn_activation: "gelu"
  gated_ffn: false
  norm_layer: "layer_norm"
  padding_type: "zeros"
  pos_embed_type: "t+h+w"
  use_relative_pos: true
  self_attn_use_final_proj: true
  dec_use_first_self_attn: false

  z_init_method: "zeros"
  checkpoint_level: 2

  initial_downsample_type: "stack_conv"
  initial_downsample_activation: "leaky"
  initial_downsample_stack_conv_num_layers: 3
  initial_downsample_stack_conv_dim_list: [4, 16, 64]
  initial_downsample_stack_conv_downscale_list: [3, 2, 2]
  initial_downsample_stack_conv_num_conv_list: [2, 2, 2]

  attn_linear_init_mode: "0"
  ffn_linear_init_mode: "0"
  conv_init_mode: "0"
  down_up_linear_init_mode: "0"
  norm_init_mode: "0"

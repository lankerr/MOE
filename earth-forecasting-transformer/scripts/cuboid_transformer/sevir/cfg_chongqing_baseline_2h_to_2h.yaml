"""
Baseline Experiment: 重庆雷达数据 2h → 2h
=========================================

重庆数据特点:
- 帧间隔: 6分钟 (vs SEVIR 5分钟)
- 原始尺寸: 约 500x500 (雷达PPI扫描)
- 预处理: resize 到目标尺寸
- 格式: day_simple_YYYYMMDD.npy → (240, H, W)

与SEVIR差异:
1. 时间分辨率: 6分钟/帧 vs 5分钟/帧
2. 覆盖范围: 重庆地区 vs 美国东南部
3. 地形影响: 山地 vs 平原

尺寸配置说明:
- 原始重庆雷达: ~500x500 或 600x600
- 预处理后默认: 384x384 (与SEVIR一致)
- 可选尺寸: 256x256 (更快), 512x512 (更精细)
"""

dataset:
  dataset_name: "chongqing"
  # 图像尺寸配置 - 根据实际预处理结果修改
  img_height: 384   # 可选: 256, 384, 512
  img_width: 384    # 可选: 256, 384, 512
  # 重庆数据: 20帧 ≈ 2小时 (6分钟间隔)
  # 为保持一致性, 仍使用24帧 (实际2.4小时)
  in_len: 24
  out_len: 24
  seq_len: 48
  plot_stride: 2
  interval_real_time: 6  # 重庆数据6分钟间隔
  sample_mode: "sequent"
  stride: 24
  layout: "NTHWC"
  # 数据目录
  data_dir: "C:\\Users\\97290\\Desktop\\datasets\\2026chongqing\\vil_gpu_daily_240_simple"
  # 或者使用相对路径
  # data_dir: "./data/chongqing"

  metrics_mode: "0"
  metrics_list: ['csi', 'pod', 'sucr', 'bias']
  threshold_list: [16, 74, 133, 160, 181, 219]

layout:
  in_len: 24
  out_len: 24
  layout: "NTHWC"

optim:
  total_batch_size: 4
  micro_batch_size: 1
  seed: 0
  method: "adamw"
  lr: auto
  wd: 0.01
  gradient_clip_val: 1.0
  max_epochs: 50
  # Adaptive LR Scheduler
  lr_scheduler_mode: "adaptive"
  lr_finder_enabled: true
  lr_finder_start_lr: 1e-7
  lr_finder_end_lr: 1.0
  lr_reduce_factor: 0.5
  lr_reduce_patience: 5
  lr_reduce_threshold: 1e-4
  min_lr: 1e-6
  # AutoStop
  early_stop: true
  early_stop_mode: "min"
  early_stop_patience: 15
  early_stop_min_delta: 1e-4
  grad_norm_threshold: 1e-5
  save_top_k: 1

logging:
  logging_prefix: "Chongqing_Baseline_2h_to_2h"
  monitor_lr: true
  monitor_device: false
  track_grad_norm: -1
  use_wandb: false

trainer:
  check_val_every_n_epoch: 1
  log_step_ratio: 0.001
  precision: "bf16-mixed"
  accumulate_grad_batches: 4

vis:
  train_example_data_idx_list: [0, ]
  val_example_data_idx_list: [80, ]
  test_example_data_idx_list: [0, 80, 160, 240, 320, 400]
  eval_example_only: false
  plot_stride: 2

model:
  # 使用配置中的尺寸
  input_shape: [24, 384, 384, 1]    # [in_len, img_height, img_width, channels]
  target_shape: [24, 384, 384, 1]   # [out_len, img_height, img_width, channels]
  base_units: 64
  scale_alpha: 1.0

  enc_depth: [2, 2]
  dec_depth: [2, 2]
  enc_use_inter_ffn: true
  dec_use_inter_ffn: true
  dec_hierarchical_pos_embed: false

  downsample: 2
  downsample_type: "patch_merge"
  upsample_type: "upsample"

  num_global_vectors: 8
  use_dec_self_global: false
  dec_self_update_global: true
  use_dec_cross_global: false
  use_global_vector_ffn: false
  use_global_self_attn: true
  separate_global_qkv: true
  global_dim_ratio: 1

  self_pattern: "axial"
  cross_self_pattern: "axial"
  cross_pattern: "cross_1x1"
  dec_cross_last_n_frames: null

  attn_drop: 0.1
  proj_drop: 0.1
  ffn_drop: 0.1
  num_heads: 4

  ffn_activation: "gelu"
  gated_ffn: false
  norm_layer: "layer_norm"
  padding_type: "zeros"
  pos_embed_type: "t+h+w"
  use_relative_pos: true
  self_attn_use_final_proj: true
  dec_use_first_self_attn: false

  z_init_method: "zeros"
  checkpoint_level: 2

  initial_downsample_type: "stack_conv"
  initial_downsample_activation: "leaky"
  initial_downsample_stack_conv_num_layers: 3
  initial_downsample_stack_conv_dim_list: [4, 16, 64]
  initial_downsample_stack_conv_downscale_list: [3, 2, 2]
  initial_downsample_stack_conv_num_conv_list: [2, 2, 2]

  attn_linear_init_mode: "0"
  ffn_linear_init_mode: "0"
  conv_init_mode: "0"
  down_up_linear_init_mode: "0"
  norm_init_mode: "0"
